<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saúde Essencial</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Montserrat', sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      overflow-x:hidden;
      position:relative;
      background:#0d1f4f;
    }

    /* IMAGEM DE FUNDO */
    body::after{
      content:"";
      position:fixed;
      inset:0;

      background-image:url('https://i.imgur.com/fai82I6.jpg');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      z-index:-2;
    }

    /* OVERLAY ESCURO */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:rgba(8,19,55,0.70);
      backdrop-filter:blur(2px);

      z-index:-1;
    }

    .container{
      position:relative;
      z-index:2;

      width:100%;
      max-width:430px;

      background:linear-gradient(180deg,#ffffff 0%,#dfeffc 100%);
      border-radius:28px;
      padding:45px 30px 30px;

      box-shadow:0 20px 50px rgba(0,0,0,0.35);
    }

    .logo-area{
      display:flex;
      justify-content:center;
      margin-bottom:30px;
    }

    .logo-circle{
      width:220px;
      height:220px;
      border:6px solid #3468b8;
      border-radius:50%;
      background:#fff;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:18px;
      overflow:hidden;
    }

    .logo-circle img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .title{
      text-align:center;
      font-size:2rem;
      line-height:1.15;
      font-weight:800;
      color:#041b67;
      margin-bottom:35px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .menu a{
      text-decoration:none;
    }

    .btn{
      width:100%;
      background:#02196f;
      border-radius:60px;
      padding:20px 24px;

      display:flex;
      align-items:center;
      gap:18px;

      color:#fff;

      transition:0.3s ease;

      box-shadow:0 12px 25px rgba(0,0,0,0.28);
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.01);
      box-shadow:0 16px 30px rgba(0,0,0,0.35);
    }

    .icon{
      width:58px;
      min-width:58px;
      height:58px;

      border-radius:50%;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:1.8rem;
      color:#fff;
    }

    .whatsapp{
      background:#25D366;
    }

    .white-icon{
      background:rgba(255,255,255,0.12);
    }

    .text{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .main-text{
      font-size:1rem;
      font-weight:800;
      text-transform:uppercase;
      line-height:1.2;
    }

    .price{
      font-size:0.95rem;
      font-weight:700;
      opacity:0.95;
    }

    .footer{
      margin-top:30px;
      text-align:center;
      font-size:0.68rem;
      line-height:1.5;
      color:#4a4a4a;
      font-weight:500;
    }

    @media (max-width:520px){

      .container{
        padding:35px 20px 25px;
      }

      .logo-circle{
        width:190px;
        height:190px;
      }

      .title{
        font-size:1.6rem;
      }

      .btn{
        padding:18px 20px;
      }

      .main-text{
        font-size:0.92rem;
      }

      .footer{
        font-size:0.62rem;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="logo-area">

      <div class="logo-circle">

        <img 
          src="https://i.imgur.com/Vc2q8qd.png"
          alt="Saúde Essencial"
        >

      </div>

    </div>

    <h1 class="title">
      O Cartão de Saúde Essencial<br>
      pra você e sua família.
    </h1>

    <div class="menu">

      <!-- WHATSAPP -->
      <a href="https://wa.me/5555999373771" target="_blank">

        <div class="btn">

          <div class="icon whatsapp">
            <i class="fa-brands fa-whatsapp"></i>
          </div>

          <div class="text">
            <span class="main-text">
              Fale com nossa equipe
            </span>
          </div>

        </div>

      </a>

      <!-- PLANO BASICO -->
      <a href="https://www.saudeessencialoficial.com.br/cadastro.html?plano=basico" target="_blank">

        <div class="btn">

          <div class="icon white-icon">
            <i class="fa-regular fa-id-card"></i>
          </div>

          <div class="text">
            <span class="main-text">Plano Básico</span>
            <span class="price">R$ 49,90</span>
          </div>

        </div>

      </a>

      <!-- PLANO TOP -->
      <a href="https://www.saudeessencialoficial.com.br/cadastro.html?plano=top" target="_blank">

        <div class="btn">

          <div class="icon white-icon">
            <i class="fa-regular fa-id-card"></i>
          </div>

          <div class="text">
            <span class="main-text">Plano Top</span>
            <span class="price">R$ 89,90</span>
          </div>

        </div>

      </a>

      <!-- SITE -->
      <a href="https://www.saudeessencialoficial.com.br/" target="_blank">

        <div class="btn">

          <div class="icon white-icon">
            <i class="fa-solid fa-globe"></i>
          </div>

          <div class="text">
            <span class="main-text">Nosso Site</span>
          </div>

        </div>

      </a>

      <!-- MAPA -->
      <a href="https://maps.app.goo.gl/fbrZjfQXguf1Jw6B8" target="_blank">

        <div class="btn">

          <div class="icon white-icon">
            <i class="fa-solid fa-location-dot"></i>
          </div>

          <div class="text">
            <span class="main-text">Como Chegar</span>
          </div>

        </div>

      </a>

    </div>

    <!-- RODAPÉ -->
    <div class="footer">
      © Todos os direitos reservados.<br>
      CLÍNICA SAÚDE ESSENCIAL 2026.<br>
      Desenvolvido por MARKETING STRATEGICK.
    </div>

  </div>

</body>
</html>
